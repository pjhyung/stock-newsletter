# ============================================================
# 미국 주식 뉴스레터 자동화 - GitHub Actions Workflow
#
# ▶ 실행 일정: 매일 08:00 KST (= UTC 23:00, 전날)
# ▶ 수동 실행: GitHub UI → Actions → "Run workflow" 버튼
# ▶ 배포 URL : https://{username}.github.io/{repo-name}/
#
# ── GitHub Secrets 설정 방법 ──────────────────────────────
# GitHub 저장소 → Settings → Secrets and variables → Actions
# → New repository secret 으로 아래 4개 등록:
#
#   GEMINI_API_KEY     : Google AI Studio에서 발급 (무료)
#   SLACK_BOT_TOKEN    : Slack 앱 OAuth 토큰 (xoxb-...)
#   SLACK_CHANNEL_ID   : 전송 대상 채널 ID (C로 시작하는 11자리)
#   NEWSLETTER_AUTHOR  : 이름 (예: 형)
#
# ── GitHub Pages 최초 설정 (1회만) ───────────────────────
# 저장소 → Settings → Pages
#   → Source: "Deploy from a branch"
#   → Branch: gh-pages / (root)
#   → Save
# ============================================================

name: Daily US Stock Newsletter

on:
  schedule:
    # 매일 08:00 KST = 전날 23:00 UTC
    - cron: "0 23 * * *"

  # GitHub UI에서 수동 실행 허용
  workflow_dispatch:
    inputs:
      hours_back:
        description: "뉴스 수집 시간 범위 (기본: 12시간)"
        required: false
        default: "12"
        type: string

jobs:
  generate-and-deploy:
    name: Generate & Deploy Newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Slack 승인 대기 포함

    # gh-pages 브랜치 push 권한
    permissions:
      contents: write

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 환경 세팅 ─────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: newsletter/requirements.txt

      # ── 3. 의존성 설치 ──────────────────────────────────
      - name: Install dependencies
        run: |
          cd newsletter
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 파이프라인 실행 ──────────────────────────────
      - name: Run newsletter pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          NEWSLETTER_AUTHOR: ${{ secrets.NEWSLETTER_AUTHOR }}
        run: |
          cd newsletter
          python main.py

      # ── 5. GitHub Pages 배포 준비 ───────────────────────
      # _site/ 구조:
      #   index.html                    ← 항상 최신 뉴스레터
      #   archive/newsletter_YYYYMMDD.html ← 날짜별 보관본
      - name: Prepare GitHub Pages site
        run: |
          mkdir -p _site/archive

          # 오늘 날짜 파일명 (KST 기준)
          TODAY=$(TZ='Asia/Seoul' date +%Y%m%d)
          HTML_FILE="newsletter/output/newsletter_${TODAY}.html"

          if [ -f "$HTML_FILE" ]; then
            # 최신본 → index.html (항상 덮어씀)
            cp "$HTML_FILE" _site/index.html

            # 날짜별 보관본
            cp "$HTML_FILE" "_site/archive/newsletter_${TODAY}.html"

            echo "Deployed: $HTML_FILE"
          else
            # 파일이 없으면 빈 안내 페이지 생성 (배포 실패 방지)
            echo "<html><body><h2>Newsletter not yet generated for ${TODAY}</h2></body></html>" > _site/index.html
            echo "Warning: HTML file not found for ${TODAY}"
          fi

          # 보관 목록 페이지 생성 (archive/index.html)
          echo "<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'>
          <title>뉴스레터 아카이브</title>
          <style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px}
          h1{color:#1a365d}a{color:#3182ce;text-decoration:none;display:block;padding:8px 0;border-bottom:1px solid #e2e8f0}
          a:hover{color:#2b6cb0}</style></head>
          <body><h1>📰 뉴스레터 아카이브</h1>
          <p><a href='../index.html'>← 최신 뉴스레터 보기</a></p><hr>" > _site/archive/index.html

          for f in _site/archive/newsletter_*.html; do
            name=$(basename "$f" .html)
            date_str="${name#newsletter_}"
            # YYYYMMDD → YYYY-MM-DD 형식으로 변환
            formatted="${date_str:0:4}-${date_str:4:2}-${date_str:6:2}"
            echo "<a href='${name}.html'>${formatted}</a>" >> _site/archive/index.html
          done

          echo "</body></html>" >> _site/archive/index.html

      # ── 6. gh-pages 브랜치에 배포 ──────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # 기존 파일 유지 (누적 아카이브 보존)
          keep_files: true
          commit_message: "newsletter: ${{ github.run_number }} ($(TZ='Asia/Seoul' date +%Y-%m-%d))"

      # ── 7. 아티팩트 백업 (선택, 30일 보관) ──────────────
      - name: Upload newsletter artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_number }}
          path: |
            newsletter/output/*.html
            newsletter/output/*.log
          retention-days: 30
          if-no-files-found: warn
